name: cbshow auto update

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # ⬅️ 加這行

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 下載程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安裝 Playwright
        run: |
          pip install playwright
          playwright install --with-deps

      - name: 執行腳本
        run: python auto_update.py
